<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>P-05 System Building — Dev.to Cover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0a0a0b;
      font-family: 'Fira Code', monospace;
    }

    .cover {
      width: 1200px;
      height: 630px;
      background: #0a0a0b;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 4px;
      display: flex;
      align-items: center;
    }

    .cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(34, 211, 238, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .cover::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 100%, rgba(34, 211, 238, 0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    /* All content in one centered flex row — no absolute top/bottom elements */
    .content {
      display: flex;
      align-items: center;
      width: 100%;
      z-index: 1;
      position: relative;
    }

    /* Left: label + title + body stacked */
    .text-col {
      width: 560px;
      padding: 0 48px 0 64px;
    }

    .kicker {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #22d3ee;
      margin-bottom: 20px;
    }

    .kicker .dot {
      color: #f59e0b;
    }

    .headline {
      font-size: 44px;
      font-weight: 700;
      color: #f4f4f5;
      line-height: 1.2;
      margin-bottom: 24px;
    }

    .headline .accent {
      color: #22d3ee;
    }

    .body-text {
      font-size: 16px;
      font-weight: 400;
      color: #a1a1aa;
      line-height: 1.6;
      max-width: 400px;
      margin-bottom: 20px;
    }

    .site-label {
      font-size: 12px;
      font-weight: 400;
      color: #52525b;
      letter-spacing: 0.04em;
    }

    /* Divider */
    .divider {
      width: 1px;
      height: 280px;
      background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.08) 30%, rgba(255,255,255,0.08) 70%, transparent 100%);
      flex-shrink: 0;
    }

    /* Right: abstraction ladder */
    .ladder-col {
      flex: 1;
      padding: 0 64px 0 48px;
    }

    .layer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .layer-bar {
      height: 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .layer-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .layer-1 .layer-bar { width: 200px; background: #3f3f46; }
    .layer-1 .layer-label { color: #52525b; }

    .layer-2 .layer-bar { width: 260px; background: #52525b; }
    .layer-2 .layer-label { color: #71717a; }

    .layer-3 .layer-bar { width: 320px; background: #71717a; }
    .layer-3 .layer-label { color: #a1a1aa; }

    .layer-4 .layer-bar { width: 380px; background: linear-gradient(90deg, #22d3ee 0%, rgba(34, 211, 238, 0.4) 100%); box-shadow: 0 0 12px rgba(34, 211, 238, 0.3); }
    .layer-4 .layer-label { color: #22d3ee; }

    .layer-connector {
      width: 2px;
      height: 14px;
      background: rgba(255, 255, 255, 0.08);
      margin-left: 14px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="cover">
    <div class="content">
      <div class="text-col">
        <div class="kicker">// System Building <span class="dot">&middot;</span> LeanOS</div>
        <div class="headline">Business ops<br>are <span class="accent">code</span> now</div>
        <div class="body-text">Human language is the next abstraction layer. The programming evolution just reached operations.</div>
        <div class="site-label">bellabe.github.io</div>
      </div>

      <div class="divider"></div>

      <div class="ladder-col">
        <div class="layer layer-4">
          <div class="layer-bar"></div>
          <span class="layer-label">Human Language</span>
        </div>
        <div class="layer-connector"></div>
        <div class="layer layer-3">
          <div class="layer-bar"></div>
          <span class="layer-label">Python / High-Level</span>
        </div>
        <div class="layer-connector"></div>
        <div class="layer layer-2">
          <div class="layer-bar"></div>
          <span class="layer-label">C / Low-Level</span>
        </div>
        <div class="layer-connector"></div>
        <div class="layer layer-1">
          <div class="layer-bar"></div>
          <span class="layer-label">Assembly</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
